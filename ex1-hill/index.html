<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Exercise 1</title>
</head>
<body class="bg-white min-h-screen flex flex-col items-center m-0 p-0">
  <!-- Title Section -->
  <div class="mt-8 sm:mt-10 mb-5 sm:mb-6 flex flex-col items-center px-4">
    <h1 class="text-3xl sm:text-4xl font-bold text-cyan-900 text-center">Browse by</h1>
    <h2 class="text-3xl sm:text-4xl font-bold mt-1 text-cyan-900 relative inline-block">
      <span class="relative">Job </span>
      <span >
        Categories
        <span class="absolute left-0 bottom-1 w-12 sm:w-16 h-4 bg-orange-500 opacity-70 -z-10"></span>
      </span>
    </h2>
  </div>
  
  <!-- Categories Section -->
  <section class="w-full flex justify-center pb-10">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 max-w-6xl w-full px-4 sm:px-6 lg:px-10">
      <!-- Card 1 -->
      <div class="bg-white rounded-2xl p-5 sm:p-6 shadow border border-gray-100 flex flex-col gap-3 items-start hover:shadow-md transition cursor-pointer h-full">
        <div>
          <img src="digital.png" alt="digital-icon" class="w-12 h-12 sm:w-16 sm:h-16 object-contain" />
        </div>
        <span class="font-bold text-[#193c58] text-base pt-4 sm:pt-10">Digital Marketing</span>
        <span class="text-xs text-[#193c58]">143 Jobs Opened</span>
        <span class="ml-auto text-[#193c58] text-xl">&#8594;</span>
      </div>
      <!-- Card 2 -->
      <div class="bg-white rounded-2xl p-5 sm:p-6 shadow border border-gray-100 flex flex-col gap-3 items-start hover:shadow-md transition cursor-pointer h-full">
        <div >
          <img src="pen.png" alt="pen-icon" class="w-12 h-12 sm:w-16 sm:h-16 object-contain" />
        </div>
        <span class="font-bold text-[#193c58] text-base pt-4 sm:pt-10">Art & Design</span>
        <span class="text-xs text-[#193c58]">110 Jobs Opened</span>
        <span class="ml-auto text-[#193c58] text-xl">&#8594;</span>
      </div>
      <!-- Card 3 -->
      <div class="bg-white rounded-2xl p-5 sm:p-6 shadow border border-gray-100 flex flex-col gap-3 items-start hover:shadow-md transition cursor-pointer h-full">
        <div >
          <img src="money.png" alt="money-icon" class="w-12 h-12 sm:w-16 sm:h-16 object-contain" />
        </div>
        <span class="font-bold text-[#193c58] text-base pt-4 sm:pt-10">Accounting</span>
        <span class="text-xs text-[#193c58]">158 Jobs Opened</span>
        <span class="ml-auto text-[#193c58] text-xl">&#8594;</span>
      </div>
      <!-- Card 4 -->
      <div class="bg-white rounded-2xl p-5 sm:p-6 shadow border border-gray-100 flex flex-col gap-3 items-start hover:shadow-md transition cursor-pointer h-full">
        <div >
          <img src="camera.png" alt="camera-icon" class="w-12 h-12 sm:w-16 sm:h-16 object-contain" />
        </div>
        <span class="font-bold text-[#193c58] text-base pt-4 sm:pt-10">Photography</span>
        <span class="text-xs text-[#193c58]">95 Jobs Opened</span>
        <span class="ml-auto text-[#193c58] text-xl">&#8594;</span>
      </div>
      <!-- Card 5 -->
      <div class="bg-white rounded-2xl p-5 sm:p-6 shadow border border-gray-100 flex flex-col gap-3 items-start hover:shadow-md transition cursor-pointer h-full">
        <div >
          <img src="copy.png" alt="copy-icon" class="w-12 h-12 sm:w-16 sm:h-16 object-contain" />
        </div>
        <span class="font-bold text-[#193c58] text-base pt-4 sm:pt-10">Copy Writing</span>
        <span class="text-xs text-[#193c58]">113 Jobs Opened</span>
        <span class="ml-auto text-[#193c58] text-xl">&#8594;</span>
      </div>
      <!-- Card 6 -->
      <div class="bg-white rounded-2xl p-5 sm:p-6 shadow border border-gray-100 flex flex-col gap-3 items-start hover:shadow-md transition cursor-pointer h-full">
        <div >
          <img src="music.png" alt="music-icon" class="w-12 h-12 sm:w-16 sm:h-16 object-contain" />
        </div>
        <span class="font-bold text-[#193c58] text-base pt-4 sm:pt-10">Music</span>
        <span class="text-xs text-[#193c58]">55 Jobs Opened</span>
        <span class="ml-auto text-[#193c58] text-xl">&#8594;</span>
      </div>    
      <!-- Card 7 -->
      <div class="bg-white rounded-2xl p-5 sm:p-6 shadow border border-gray-100 flex flex-col gap-3 items-start hover:shadow-md transition cursor-pointer h-full">
        <div >
          <img src="human.png" alt="human-icon" class="w-12 h-12 sm:w-16 sm:h-16 object-contain" />
        </div>
        <span class="font-bold text-[#193c58] text-base pt-4 sm:pt-10">Human Resouces</span>
        <span class="text-xs text-[#193c58]">25 Jobs Opened</span>
        <span class="ml-auto text-[#193c58] text-xl">&#8594;</span>
      </div>    
      <!-- Card 8: Explore More -->
      <div class="bg-[#FF8846] rounded-2xl p-5 sm:p-6 shadow border border-[#FF8846] flex flex-col justify-center items-start relative w-full h-full hover:shadow-md transition cursor-pointer overflow-hidden">
        <!-- Decorative SVG Waves -->
        <svg class="absolute inset-0 w-full h-full pointer-events-none" fill="none" viewBox="0 0 260 200" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 20 C50 0, 100 40, 230 10" stroke="#FFD0AD" stroke-width="1" fill="none"/>
          <path d="M10 90 C70 130, 200 60, 250 110" stroke="#FFD0AD" stroke-width="1" fill="none"/>
          <path d="M0 190 C60 175, 170 220, 260 170" stroke="#FFD0AD" stroke-width="1" fill="none"/>
        </svg>
        <div class="relative z-10">
          <div class="text-white font-bold text-lg leading-tight mb-2">
            <div>Explore<br>30 More<br>Categories</div>
          </div>
          <span class="inline-block mt-2 text-white text-2xl font-bold align-middle">&#8594;</span>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
